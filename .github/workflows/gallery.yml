name: Gallery
on:
  push:
    branches: ['**']
  pull_request:
jobs:
  gallery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Generate placeholder gallery
        run: node scripts/gallery-stub.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: gallery
          path: gallery-output/
