name: Gallery
on:
  push:
    branches: ['**']
  pull_request:
jobs:
  gallery:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build:demo
      - name: Screenshot current branch
        run: node scripts/gallery-screenshot.mjs
      - name: Download base branch gallery (PRs only)
        if: github.event_name == 'pull_request'
        run: node scripts/gallery-download-base.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: ${{ github.base_ref }}
          REPO: ${{ github.repository }}
      - name: Generate comparison page
        run: node scripts/gallery-compare.mjs
      - uses: actions/upload-artifact@v4
        id: upload
        with:
          name: gallery
          path: gallery-output/
          retention-days: 30
      - name: Post / update sticky PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: gallery
          message: |
            ## Gallery Report

            Visual diff for this PR is available on the [workflow run summary](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#summary-${{ github.job }}) — scroll to "Gallery Report" to see screenshots inline.

            **Reference proteins:** 3K19 (A2A), 2OMF (OmpF), 7AHL (alpha-hemolysin)

            [Download full artifact](${{ steps.upload.outputs.artifact-url }}) for the standalone HTML report.
