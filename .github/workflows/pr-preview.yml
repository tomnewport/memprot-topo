name: PR Preview
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: npm
      - run: npm ci
      - run: npm run prebuild:demo
      - run: npm run build:demo
      - name: Deploy preview to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          PR_DIR="pr-${{ github.event.pull_request.number }}"
          rm -rf "$PR_DIR"
          cp -r dist-demo "$PR_DIR"
          git add "$PR_DIR"
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "deploy: PR #${{ github.event.pull_request.number }} preview [skip ci]"
            git push origin gh-pages
          fi
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          message: |
            ## Preview

            Live preview: https://tomnewport.github.io/memprot-topo/pr-${{ github.event.pull_request.number }}/

            _Updates automatically on each push._

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Remove preview from gh-pages branch
        run: |
          git fetch origin gh-pages 2>/dev/null || exit 0
          git checkout gh-pages 2>/dev/null || exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          PR_DIR="pr-${{ github.event.pull_request.number }}"
          if [ -d "$PR_DIR" ]; then
            git rm -rf "$PR_DIR"
            git commit -m "deploy: remove PR #${{ github.event.pull_request.number }} preview [skip ci]"
            git push origin gh-pages
          fi
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          message: |
            ## Preview

            _Preview removed — PR closed._
